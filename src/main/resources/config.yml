#重载指令/bfr
#拥有 bonfire.food.bypass 权限的人吃东西不受腐烂状态影响

# 现实模拟增强（三倍时间版）
# 1小时=60  1天=1440  1周=10080  1月(30天)=43200  1年=525600
scan-interval-ticks: 40
tracking:
  # false: 创造模式不执行腐烂扫描，避免创造物品栏点击时物品消失/回滚
  track-creative-mode: false
stacking:
  # true: 同状态且元数据一致的食材会自动并堆，减少碎格
  merge-enabled: true
  # 将创建时间按时间桶取整（秒）；0 表示严格原始时间
  # 建议 300~900，值越大越容易堆叠
  creation-time-bucket-seconds: 600

bundle-protection:
  # true: 白色收纳袋(或你配置的收纳袋材质)内食物暂停腐烂计时
  enabled: true
  # 1.21+ 可用 WHITE_BUNDLE / BUNDLE / 其它染色收纳袋
  protected-materials:
    - 'WHITE_BUNDLE'

