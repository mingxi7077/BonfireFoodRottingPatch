lore:
  # 与 LiteCooking 严格比对兼容：食材状态行必须写入
  write-state-line: true
  # 颜色请使用 1.16+ 兼容写法：&x&R&R&G&G&B&B（本插件仅做 & -> § 替换）
  fresh: "&x&A&6&9&D&8&A食物状态: &x&B&7&C&5&A&3新鲜"
  spoiled: "&x&A&6&9&D&8&A食物状态: &x&C&8&A&D&7&E变质"
  rotten: "&x&A&6&9&D&8&A食物状态: &x&C&7&A&7&A&0腐烂"
